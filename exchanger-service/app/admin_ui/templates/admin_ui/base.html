<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Exchanger Admin{% endblock %}</title>
  <style>
    :root {
      --bg: #f7f8fa; --panel: #ffffff; --text: #1b1f24; --muted: #5b6572;
      --border: #e1e4e8; --accent: #2563eb;
      --ok: #1a7f37; --warn: #b35900; --bad: #b91c1c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg); color: var(--text);
    }
    header {
      background: var(--panel); border-bottom: 1px solid var(--border);
      padding: 14px 24px; display: flex; align-items: center; gap: 16px;
    }
    header h1 { font-size: 16px; margin: 0; font-weight: 700; }
    header nav a { color: var(--muted); text-decoration: none; font-size: 14px; margin-right: 16px; }
    header nav a:hover { color: var(--accent); }
    header .spacer { flex: 1; }
    main { max-width: 1100px; margin: 24px auto; padding: 0 24px; }
    .panel {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 8px; padding: 20px; margin-bottom: 16px;
    }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; }
    tr:hover td { background: #fafbfc; }
    a { color: var(--accent); }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 999px;
      font-size: 12px; font-weight: 600; color: #fff; background: var(--muted);
    }
    .badge.ok { background: var(--ok); }
    .badge.warn { background: var(--warn); }
    .badge.bad { background: var(--bad); }
    .muted { color: var(--muted); }
    .filters { margin-bottom: 12px; font-size: 14px; }
    .filters a {
      margin-right: 6px; padding: 4px 10px; border-radius: 6px;
      border: 1px solid var(--border); text-decoration: none; color: var(--text);
      display: inline-block; margin-bottom: 6px;
    }
    .filters a.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    label { display: block; font-size: 13px; font-weight: 600; margin: 12px 0 4px; }
    textarea, input[type=text], input[type=number], input[type=password] {
      width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px;
    }
    button {
      margin-top: 12px; padding: 8px 16px; border-radius: 6px; border: none;
      background: var(--accent); color: #fff; font-size: 14px; cursor: pointer;
    }
    button:hover { opacity: 0.9; }
    button.secondary { background: var(--muted); }
    code { background: #f1f3f5; padding: 1px 5px; border-radius: 4px; font-size: 13px; }
    .kv { display: grid; grid-template-columns: 200px 1fr; gap: 6px 12px; font-size: 14px; }
    .kv dt { color: var(--muted); }
    .kv dd { margin: 0; word-break: break-all; }
    .flash { padding: 10px 14px; border-radius: 6px; margin-bottom: 12px; font-size: 14px; }
    .flash.success { background: #ecfdf3; color: var(--ok); border: 1px solid #b7ebc6; }
    .flash.error { background: #fef2f2; color: var(--bad); border: 1px solid #f3c1c1; }
    .action-form { border-top: 1px solid var(--border); padding-top: 14px; margin-top: 14px; }
    h2 { font-size: 15px; margin: 0 0 12px; }
  </style>
</head>
<body>
  <header>
    <h1>Exchanger Admin</h1>
    {% if session.admin_logged_in %}
    <nav>
      <a href="{{ url_for('admin_ui.list_orders') }}">Aufträge</a>
      <a href="{{ url_for('admin_ui.users_list') }}">Nutzer</a>
      <a href="{{ url_for('admin_ui.treasury') }}">Treasury</a>
      <a href="{{ url_for('admin_ui.ledger') }}">Ledger</a>
      <a href="{{ url_for('admin_ui.new_order_form') }}">+ Neuer Auftrag</a>
    </nav>
    <div class="spacer"></div>
    <a href="{{ url_for('admin_ui.logout') }}">Abmelden</a>
    {% endif %}
  </header>
  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
