{% extends "account_ui/base.html" %}
{% block title %}Create account{% endblock %}
{% block content %}
  <div class="card">
    <h2>Create account</h2>
    <form method="post">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>
      <label for="full_name">Full name</label>
      <input type="text" id="full_name" name="full_name" required>
      <label for="date_of_birth">Date of birth (optional)</label>
      <input type="text" id="date_of_birth" name="date_of_birth" placeholder="YYYY-MM-DD">
      <label for="country">Country (optional)</label>
      <input type="text" id="country" name="country">
      <button type="submit">Continue to 2FA setup</button>
    </form>
    <p class="muted" style="margin-top: 14px;">Your name/DOB/country are used once for a sanctions check. Not re-checked on later trades.</p>
  </div>
{% endblock %}
