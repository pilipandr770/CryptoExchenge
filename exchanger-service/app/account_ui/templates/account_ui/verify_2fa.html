{% extends "account_ui/base.html" %}
{% block title %}2FA-Code eingeben{% endblock %}
{% block content %}
  <div class="card">
    <h2>2FA-Code eingeben</h2>
    <form method="post">
      <label for="code">6-stelliger Code aus Ihrer Authenticator-App</label>
      <input type="text" id="code" name="code" inputmode="numeric" pattern="[0-9]*" required autofocus>
      <button type="submit">Anmelden</button>
    </form>
  </div>
{% endblock %}
