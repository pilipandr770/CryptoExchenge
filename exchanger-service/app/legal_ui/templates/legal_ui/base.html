<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Rechtliches{% endblock %} - Crypto Exchanger</title>
  <style>
    :root {
      --bg: #0f1115; --panel: #171a21; --text: #eef0f4; --muted: #9aa2b1;
      --border: #2a2f3a; --accent: #4f7cff; --warn: #e8a23d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
    }
    header {
      padding: 16px 24px; display: flex; align-items: center; gap: 16px;
      border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 16px; margin: 0; font-weight: 700; }
    header nav { display: flex; gap: 14px; flex-wrap: wrap; }
    header nav a { color: var(--muted); text-decoration: none; font-size: 14px; }
    header nav a:hover { color: var(--accent); }
    header .spacer { flex: 1; }
    main { max-width: 720px; margin: 0 auto; padding: 32px 20px 60px; line-height: 1.6; }
    .card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 14px; padding: 24px 28px; margin-bottom: 16px;
    }
    h2 { font-size: 20px; margin-top: 0; }
    h3 { font-size: 15px; color: var(--muted); margin-bottom: 4px; }
    p { margin: 0 0 12px; }
    ul { margin: 0 0 12px; padding-left: 20px; }
    a { color: var(--accent); }
    .muted { color: var(--muted); font-size: 13px; }
    .notice {
      background: rgba(232,162,61,0.1); border: 1px solid rgba(232,162,61,0.35);
      color: var(--warn); border-radius: 10px; padding: 14px 16px; font-size: 14px; margin-bottom: 20px;
    }
    footer { text-align: center; padding: 20px; font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>Crypto Exchanger</h1>
    <nav>
      <a href="{{ url_for('account_ui.landing') }}">Startseite</a>
      <a href="{{ url_for('legal_ui.impressum') }}">Impressum</a>
      <a href="{{ url_for('legal_ui.datenschutz') }}">Datenschutz</a>
      <a href="{{ url_for('legal_ui.agb') }}">AGB</a>
      <a href="{{ url_for('legal_ui.widerruf') }}">Widerruf</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>Demo-Build -- MVP für den Eigenbedarf, keine lizenzierte öffentliche Wechselstube.</footer>
</body>
</html>
